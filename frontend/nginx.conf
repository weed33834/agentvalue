server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 安全响应头
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # 静态资源长缓存（Vite 构建产物带 hash）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API 反向代理到后端（保留完整路径，后端路由前缀为 /api/v1）
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 清空客户端可能伪造的身份头，防止绕过认证
        proxy_set_header x-user-role "";
        proxy_set_header x-user-id "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 健康检查代理到后端
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # Prometheus 指标端点代理到后端（admin 系统指标页解析文本展示）
    location /metrics {
        proxy_pass http://backend:8000/metrics;
        proxy_set_header Host $host;
    }

    # SPA history 模式 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
