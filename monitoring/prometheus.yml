# Prometheus 抓取配置
# 用法:docker-compose.prod.yml 的 prometheus 服务挂载本文件到 /etc/prometheus/prometheus.yml
# 抓取目标:backend 的 /metrics 端点(backend/core/metrics.py setup_metrics 暴露)
# 告警规则:同目录 alerts.yml,evaluation_interval 周期评估

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    # Alertmanager 未在生产 compose 内置。启用告警通知(邮件/钉钉/飞书)时
    # 另行部署 Alertmanager 并取消下方注释,把告警从 Prometheus 推到通知渠道。
    # - static_configs:
    #     - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: agentvalue-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: backend
