# Dependabot 依赖更新配置
# 仅创建 PR 供人工 review, 不自动合并
version: 2

updates:
  # Python 后端依赖
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps(python)"
      include: scope
    # 安全更新立即创建 PR, 不等周计划
    # (security updates always open immediately regardless of schedule)

  # NPM 前端依赖
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: "deps(npm)"
      include: scope

  # GitHub Actions 版本更新
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "deps(ci)"
      include: scope

  # Docker 基础镜像更新
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "deps(docker)"
      include: scope
