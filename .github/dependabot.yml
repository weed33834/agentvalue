# Dependabot 配置 — 启用自动版本更新 PR 与 auto-merge
version: 2
updates:
  # Python 依赖
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "monthly"
    auto-merge:
      enabled: true
    open-pull-requests-limit: 5
  # npm 依赖
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    auto-merge:
      enabled: true
    open-pull-requests-limit: 5
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    auto-merge:
      enabled: true
    open-pull-requests-limit: 5
  # Docker
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
    auto-merge:
      enabled: true
    open-pull-requests-limit: 5
